apiVersion: v1
kind: Service
metadata:
  name: dremio
  namespace: dremio
  labels:
    app: dremio
spec:
  selector:
    app: dremio
  ports:
    - name: web        # UI (port-forward this)
      port: 9047
      targetPort: web
    - name: client     # JDBC / ODBC
      port: 31010
      targetPort: client
    - name: flight     # Arrow Flight SQL (Superset/BI tools connect here)
      port: 32010
      targetPort: 32010
