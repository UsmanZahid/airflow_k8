apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3          # S3 API — delta-rs / ETL pods use http://minio.minio.svc.cluster.local:9000
      port: 9000
      targetPort: s3
    - name: console     # object-browser UI (create buckets via the mc Job, not here)
      port: 9001
      targetPort: console
