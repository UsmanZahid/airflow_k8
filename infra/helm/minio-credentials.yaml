# TEST-ONLY. Mirrors the MinIO creds into the airflow namespace so KPO-launched ETL pods
# (and Airflow's own S3 connection) can reach MinIO. env_from injects these into each pod;
# etl/framework/storage.py reads MINIO_ACCESS_KEY / MINIO_SECRET_KEY / MINIO_ENDPOINT.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: airflow
type: Opaque
stringData:
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin123
