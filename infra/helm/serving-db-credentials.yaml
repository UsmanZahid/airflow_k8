# TEST-ONLY. Connection URI for the serving Postgres (in the superset namespace), consumed
# by the earthquakes `publish` step running in KPO pods (airflow namespace) to sync gold -> BI.
apiVersion: v1
kind: Secret
metadata:
  name: serving-db
  namespace: airflow
type: Opaque
stringData:
  SERVING_DB_URI: "postgresql://bi:bi_password@serving-postgres.superset.svc.cluster.local:5432/analytics"
